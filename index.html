<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabal Studio — Digital garden</title>
<style>
*, ::after, ::before { box-sizing: border-box; }
h1,h2,h3,h4,h5 { font-size: inherit; font-weight: inherit; margin: 0; }
ul { list-style-type: none; margin: 0; padding: 0; }
.hidden { display: none !important; }

:root {
  --background-color: white;
  --color: black;
  --border-color: black;
  --header-height: 48px;
}

body {
  background-color: var(--background-color);
  color: var(--color);
  font-family: Courier, "Courier New", monospace;
  font-size: 16px;
  font-weight: normal;
  margin: 0;
  padding-top: var(--header-height);
}

a { color: inherit; text-decoration: underline dotted; text-underline-offset: 4px; }
a:hover { text-decoration-style: solid; }

/* FIXED HEADER */
#site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-height);
  background: var(--background-color);
  
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1rem;
  z-index: 100;
}

#logo {
  font-size: 14px;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
}

#mode-menu {
  font-size: 13px;
  opacity: 0.5;
}

/* GRID VIEW */
#view-grid { padding: 1rem; }

#main-navigation {
  margin-bottom: 2rem;
  display: flex;
  flex-flow: wrap;
  gap: 0.5rem;
}

#main-navigation button {
  display: inline-block;
  padding: 0.75rem;
  color: var(--color);
  border: 1px dotted var(--border-color);
  background: var(--background-color);
  cursor: pointer;
  font-family: Courier, "Courier New", monospace;
  font-size: 16px;
  font-weight: normal;
}

#main-navigation button:hover,
#main-navigation button.active { border-style: solid; }

.explore-blocks {
  display: flex;
  flex-wrap: wrap;
  gap: 0.625rem;
}

.explore-blocks .box {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 270px;
  height: 270px;
  padding: 0.625rem;
  border: 1px dotted transparent;
  line-height: 1.3rem;
  cursor: pointer;
  font-weight: normal;
}

.explore-blocks .box:hover { border-style: solid; border-color: currentColor; }

.explore-blocks .box > .type {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 4px;
  align-self: flex-start;
  font-weight: normal;
}

.explore-blocks .box > .title {
  font-size: 1.2rem;
  line-height: 1.25;
  font-weight: normal;
  flex: 1;
}

.explore-blocks .box > .next {
  font-size: 13px;
  line-height: 1.4;
  opacity: 0.85;
}

.explore-blocks .box > .status-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.7;
}

/* DETAIL PAGE */
#view-detail { display: none; padding: 1rem; }

.detail-back {
  font-family: Courier, "Courier New", monospace;
  font-size: 16px;
  font-weight: normal;
  background: var(--background-color);
  border: 1px dotted var(--border-color);
  padding: 0.75rem;
  cursor: pointer;
  color: var(--color);
  margin-bottom: 2rem;
  display: inline-block;
}
.detail-back:hover { border-style: solid; }

.detail-body { max-width: 640px; }

.detail-type {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.5;
  margin-bottom: 0.75rem;
}

.detail-title {
  font-size: 2rem;
  line-height: 1.2;
  font-weight: normal;
  margin-bottom: 1.5rem;
}

.detail-colorbar { height: 4px; margin-bottom: 2rem; }

.detail-section {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.5;
  margin-bottom: 0.5rem;
  margin-top: 1.5rem;
}

.detail-text {
  font-size: 16px;
  line-height: 1.6;
  border-left: 1px solid var(--border-color);
  padding-left: 1rem;
}

.detail-desc { font-size: 16px; line-height: 1.6; }

.detail-meta {
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px dotted var(--border-color);
  display: flex;
  gap: 2rem;
  font-size: 13px;
}

.detail-meta-item span:first-child {
  display: block;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.5;
  margin-bottom: 2px;
}

@media (max-width: 600px) {
  .explore-blocks .box { width: calc(50vw - 1.125rem); height: calc(50vw - 1.125rem); }
  .explore-blocks .box > .title { font-size: 0.9rem; }
  .explore-blocks .box > .next { display: none; }
}
</style>
</head>
<body>

<header id="site-header">
  <div id="logo" onclick="showGrid()">Cabal Studio</div>
  <div id="mode-menu"></div>
</header>

<div id="view-grid">
  <nav id="main-navigation"></nav>
  <div class="explore-blocks" id="grid"></div>
</div>

<div id="view-detail">
  <button class="detail-back" onclick="showGrid()">← Everything</button>
  <div class="detail-body">
    <div class="detail-type" id="d-area"></div>
    <h1 class="detail-title" id="d-title"></h1>
    <div class="detail-colorbar" id="d-colorbar"></div>
    <div class="detail-section">What's next</div>
    <div class="detail-text" id="d-next"></div>
    <div class="detail-section">About</div>
    <div class="detail-desc" id="d-desc"></div>
    <div class="detail-meta">
      <div class="detail-meta-item"><span>Status</span><span id="d-status"></span></div>
      <div class="detail-meta-item" id="d-where-wrap"><span>Lives in</span><span id="d-where"></span></div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZvp_64L-DXn8A9lYH2kNKuguom0IMjiFRKKsZCHH4yI4uIOh-tr1IaUmGUPQuHZs9hFStxUHYExFo/pub?gid=2086028292&single=true&output=csv';
const STATUS_LABELS = { active:'Active', blocked:'Blocked', incubating:'Incubating', pending:'Pending' };

let projects = [], currentFilter = 'all';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c==='"') { inQ=!inQ; }
      else if (c===',' && !inQ) { vals.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(p => p.title && p.visible !== 'no');
}

async function load() {
  const CACHE_KEY = 'cabal_projects';
  const CACHE_TS = 'cabal_projects_ts';

  // Carga inmediata desde caché si existe
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    projects = JSON.parse(cached);
    document.getElementById('mode-menu').textContent = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    renderNav();
    renderGrid();
  }

  // Refresca en segundo plano siempre
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const fresh = parseCSV(text);
    localStorage.setItem(CACHE_KEY, JSON.stringify(fresh));
    localStorage.setItem(CACHE_TS, Date.now());
    // Solo re-renderiza si no había caché o si hay cambios
    if (!cached || JSON.stringify(fresh) !== JSON.stringify(projects)) {
      projects = fresh;
      renderNav();
      renderGrid();
    }
  } catch(e) {
    if (!cached) {
      document.getElementById('grid').innerHTML = '<p style="opacity:0.4;font-size:13px;padding:1rem 0;">Could not load data.</p>';
    }
  }
}

function getAreas() {
  const seen=new Set(), areas=[];
  projects.forEach(p=>{ if(!seen.has(p.area)){seen.add(p.area);areas.push({id:p.area,label:p.area_label});} });
  return areas;
}

function renderNav() {
  const el = document.getElementById('main-navigation');
  const areas = [{id:'all',label:'Everything'}, ...getAreas()];
  el.innerHTML = areas.map(a =>
    `<button data-area="${a.id}" class="${a.id==='all'?'active':''}" onclick="filterBy('${a.id}',this)">${a.label}</button>`
  ).join('');
}

function renderGrid() {
  const el = document.getElementById('grid');
  const filtered = currentFilter==='all' ? projects : projects.filter(p=>p.area===currentFilter);
  el.innerHTML = filtered.map(p => {
    const idx = projects.indexOf(p);
    const bg = p.color || '#555';
    const fg = p.text_color || '#ffffff';
    return `<div class="box" style="background:${bg};color:${fg}" onclick="showDetail(${idx})">
      <div class="type" style="background:${fg};color:${bg}">${p.area_label}</div>
      <div class="title">${p.title}</div>
      <div class="next">${p.next}</div>
      <div class="status-label">${STATUS_LABELS[p.status]||p.status}</div>
    </div>`;
  }).join('');
}

function filterBy(areaId, btn) {
  currentFilter = areaId;
  document.querySelectorAll('#main-navigation button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function showDetail(idx) {
  const p = projects[idx];
  if (!p) return;
  document.getElementById('d-area').textContent = p.area_label;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-colorbar').style.background = p.color||'#ccc';
  document.getElementById('d-next').textContent = p.next;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-status').textContent = STATUS_LABELS[p.status]||p.status;
  const whereWrap = document.getElementById('d-where-wrap');
  if (p.where && p.where!=='—') {
    document.getElementById('d-where').textContent = p.where;
    whereWrap.style.display='block';
  } else { whereWrap.style.display='none'; }
  document.getElementById('view-grid').style.display='none';
  document.getElementById('view-detail').style.display='block';
  window.scrollTo(0,0);
}

function showGrid() {
  document.getElementById('view-grid').style.display='block';
  document.getElementById('view-detail').style.display='none';
}

load();
</script>
</body>
</html>
