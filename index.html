<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabal Studio — Current</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #111;
    --white: #fff;
    --gray: #888;
    --mono: 'Courier Prime', 'Courier New', monospace;
    --gap: 6px;
    --card-size: 240px;
  }

  body {
    font-family: var(--mono);
    background: var(--white);
    color: var(--black);
    font-size: 15px;
    line-height: 1.5;
  }

  /* GRID VIEW */
  #view-grid { display: block; }
  #view-detail { display: none; }

  .site-header {
    border-bottom: 1.5px solid var(--black);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .site-date {
    font-size: 12px;
    color: var(--gray);
  }

  .nav {
    border-bottom: 1.5px solid var(--black);
    padding: 0 1.5rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }

  .nav-btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 18px 10px 0;
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    color: var(--gray);
    cursor: pointer;
    white-space: nowrap;
    margin-bottom: -1.5px;
  }

  .nav-btn:hover { color: var(--black); }
  .nav-btn.active { color: var(--black); border-bottom-color: var(--black); font-weight: 700; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, var(--card-size));
    gap: var(--gap);
    padding: var(--gap);
    background: var(--black);
  }

  .card {
    width: var(--card-size);
    height: var(--card-size);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: opacity 0.12s;
    overflow: hidden;
  }

  .card:hover { opacity: 0.88; }

  .card-area {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 0.4rem;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .card-next {
    font-size: 11px;
    line-height: 1.45;
    opacity: 0.75;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
  }

  .card-status {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.65;
    margin-top: 0.75rem;
  }

  /* DETAIL VIEW */
  #view-detail {
    min-height: 100vh;
  }

  .detail-header {
    border-bottom: 1.5px solid var(--black);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .detail-back {
    font-family: var(--mono);
    font-size: 13px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--black);
    text-decoration: underline;
    padding: 0;
  }

  .detail-body {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  .detail-area-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 0.75rem;
  }

  .detail-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 1.5rem;
  }

  .detail-color-bar {
    height: 6px;
    margin-bottom: 2rem;
  }

  .detail-section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 0.5rem;
    margin-top: 1.75rem;
  }

  .detail-section-label:first-of-type { margin-top: 0; }

  .detail-text {
    font-size: 15px;
    line-height: 1.65;
    color: #222;
  }

  .detail-next-text {
    font-size: 15px;
    line-height: 1.65;
    border-left: 3px solid var(--black);
    padding-left: 1rem;
  }

  .detail-status-row {
    display: flex;
    gap: 2rem;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid #ddd;
  }

  .detail-stat label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 4px;
  }

  .detail-stat span {
    font-size: 13px;
    font-weight: 700;
  }

  @media (max-width: 600px) {
    :root { --card-size: calc(50vw - 9px); }
    .card-title { font-size: 13px; }
    .detail-title { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="view-grid">
  <header class="site-header">
    <div class="site-name">Cabal Studio</div>
    <div class="site-date" id="updated-date"></div>
  </header>
  <nav class="nav" id="nav"></nav>
  <div class="grid" id="grid"></div>
</div>

<div id="view-detail">
  <header class="detail-header">
    <button class="detail-back" onclick="showGrid()">← Back</button>
    <div class="site-name">Cabal Studio</div>
  </header>
  <div class="detail-body">
    <div class="detail-area-label" id="d-area"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-color-bar" id="d-colorbar"></div>
    <div class="detail-section-label">What's next</div>
    <div class="detail-next-text" id="d-next"></div>
    <div class="detail-section-label">About</div>
    <div class="detail-text" id="d-desc"></div>
    <div class="detail-status-row">
      <div class="detail-stat"><label>Status</label><span id="d-status"></span></div>
      <div class="detail-stat" id="d-where-wrap"><label>Lives in</label><span id="d-where"></span></div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZvp_64L-DXn8A9lYH2kNKuguom0IMjiFRKKsZCHH4yI4uIOh-tr1IaUmGUPQuHZs9hFStxUHYExFo/pub?gid=2086028292&single=true&output=csv';

const STATUS_LABELS = { active:'Active', blocked:'Blocked', incubating:'Incubating', pending:'Pending' };

let projects = [];
let currentFilter = 'all';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  }).filter(p => p.title);
}

function luminance(hex) {
  if (!hex || hex.length < 7) return 0.5;
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const f = c => c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
}

function fg(hex) { return luminance(hex) > 0.35 ? '#111' : '#fff'; }

async function load() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    projects = parseCSV(text);
    document.getElementById('updated-date').textContent = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    renderNav();
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<p style="padding:2rem;color:#fff;font-size:13px;">Could not load data.</p>';
  }
}

function getAreas() {
  const seen = new Set(), areas = [];
  projects.forEach(p => { if(!seen.has(p.area)){ seen.add(p.area); areas.push({id:p.area,label:p.area_label}); }});
  return areas;
}

function renderNav() {
  const el = document.getElementById('nav');
  const areas = [{id:'all',label:'Everything'}, ...getAreas()];
  el.innerHTML = areas.map(a =>
    `<button class="nav-btn ${a.id==='all'?'active':''}" onclick="filterBy('${a.id}',this)">${a.label}</button>`
  ).join('');
}

function renderGrid() {
  const el = document.getElementById('grid');
  const filtered = currentFilter==='all' ? projects : projects.filter(p=>p.area===currentFilter);
  el.innerHTML = filtered.map(p => {
    const bg = p.color||'#ccc', color = fg(bg);
    const idx = projects.indexOf(p);
    return `<div class="card" style="background:${bg};color:${color}" onclick="showDetail(${idx})">
      <div>
        <div class="card-area">${p.area_label}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-next">${p.next}</div>
      </div>
      <div class="card-status">${STATUS_LABELS[p.status]||p.status}</div>
    </div>`;
  }).join('');
}

function filterBy(areaId, btn) {
  currentFilter = areaId;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function showDetail(idx) {
  const p = projects[idx];
  if (!p) return;
  document.getElementById('d-area').textContent = p.area_label;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-colorbar').style.background = p.color||'#ccc';
  document.getElementById('d-next').textContent = p.next;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-status').textContent = STATUS_LABELS[p.status]||p.status;
  const whereWrap = document.getElementById('d-where-wrap');
  if (p.where && p.where !== '—') {
    document.getElementById('d-where').textContent = p.where;
    whereWrap.style.display = 'block';
  } else {
    whereWrap.style.display = 'none';
  }
  document.getElementById('view-grid').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0,0);
}

function showGrid() {
  document.getElementById('view-grid').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
}

load();
</script>
</body>
</html>
