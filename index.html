<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabal Studio — Current</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #111;
    --white: #fff;
    --gray: #888;
    --border: #ddd;
    --mono: 'Courier Prime', 'Courier New', monospace;
  }

  body {
    font-family: var(--mono);
    background: var(--white);
    color: var(--black);
    font-size: 15px;
    line-height: 1.5;
  }

  .site-header {
    border-bottom: 1.5px solid var(--black);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .site-date {
    font-size: 12px;
    color: var(--gray);
  }

  .nav {
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }

  .nav-btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 16px 10px 0;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--gray);
    cursor: pointer;
    white-space: nowrap;
    margin-bottom: -1px;
  }

  .nav-btn:hover { color: var(--black); }
  .nav-btn.active { color: var(--black); border-bottom-color: var(--black); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0;
  }

  .card {
    padding: 1.25rem;
    border-right: 1px solid var(--black);
    border-bottom: 1px solid var(--black);
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .card:hover { opacity: 0.85; }

  .card-top { flex: 1; }

  .card-area {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0.7;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }

  .card-next {
    font-size: 12px;
    line-height: 1.5;
    opacity: 0.8;
  }

  .card-bottom {
    margin-top: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-status {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .card-where {
    font-size: 11px;
    opacity: 0.6;
    text-align: right;
  }

  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .detail-overlay.open {
    display: flex;
  }

  .detail-box {
    background: var(--white);
    border: 1.5px solid var(--black);
    max-width: 520px;
    width: 100%;
    padding: 2rem;
    position: relative;
  }

  .detail-area {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 0.5rem;
  }

  .detail-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .detail-desc {
    font-size: 13px;
    line-height: 1.65;
    color: #333;
    margin-bottom: 1rem;
  }

  .detail-next {
    font-size: 13px;
    border-left: 3px solid var(--black);
    padding-left: 0.75rem;
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .detail-meta {
    font-size: 11px;
    color: var(--gray);
    margin-bottom: 1.5rem;
  }

  .detail-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    font-family: var(--mono);
    font-size: 13px;
    background: none;
    border: 1px solid var(--border);
    padding: 3px 10px;
    cursor: pointer;
    color: var(--gray);
  }

  .detail-close:hover { color: var(--black); border-color: var(--black); }

  .grid-border-top {
    border-top: 1.5px solid var(--black);
  }

  .hidden { display: none; }

  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .card { min-height: 160px; padding: 1rem; }
    .card-title { font-size: 13px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-name">Cabal Studio</div>
  <div class="site-date" id="updated-date"></div>
</header>

<nav class="nav" id="nav"></nav>

<div class="grid grid-border-top" id="grid"></div>

<div class="detail-overlay" id="overlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detail-box">
    <button class="detail-close" onclick="closeOverlay()">close</button>
    <div class="detail-area" id="d-area"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-next" id="d-next"></div>
    <div class="detail-desc" id="d-desc"></div>
    <div class="detail-meta" id="d-meta"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZvp_64L-DXn8A9lYH2kNKuguom0IMjiFRKKsZCHH4yI4uIOh-tr1IaUmGUPQuHZs9hFStxUHYExFo/pub?gid=2086028292&single=true&output=csv';

const STATUS_LABELS = {
  active: 'Active',
  blocked: 'Blocked',
  incubating: 'Incubating',
  pending: 'Pending'
};

let projects = [];
let currentFilter = 'all';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, ''));
    return obj;
  }).filter(p => p.title);
}

function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const toL = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  return 0.2126*toL(r) + 0.7152*toL(g) + 0.0722*toL(b);
}

function textColor(hex) {
  return luminance(hex) > 0.35 ? '#111' : '#fff';
}

async function load() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    projects = parseCSV(text);
    document.getElementById('updated-date').textContent = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    renderNav();
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<p style="padding:2rem;color:#999;font-size:13px;">Could not load data.</p>';
  }
}

function getAreas() {
  const seen = new Set();
  const areas = [];
  projects.forEach(p => {
    if (!seen.has(p.area)) {
      seen.add(p.area);
      areas.push({ id: p.area, label: p.area_label });
    }
  });
  return areas;
}

function renderNav() {
  const el = document.getElementById('nav');
  const areas = [{ id: 'all', label: 'Everything' }, ...getAreas()];
  el.innerHTML = areas.map(a =>
    `<button class="nav-btn ${a.id === 'all' ? 'active' : ''}" onclick="filterBy('${a.id}', this)">${a.label}</button>`
  ).join('');
}

function renderGrid() {
  const el = document.getElementById('grid');
  const filtered = currentFilter === 'all' ? projects : projects.filter(p => p.area === currentFilter);
  el.innerHTML = filtered.map((p, i) => {
    const bg = p.color || '#f0f0f0';
    const fg = textColor(bg);
    return `
      <div class="card" style="background:${bg};color:${fg}" onclick="openDetail(${projects.indexOf(p)})">
        <div class="card-top">
          <div class="card-area">${p.area_label}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-next">${p.next}</div>
        </div>
        <div class="card-bottom">
          <div class="card-status">${STATUS_LABELS[p.status] || p.status}</div>
          ${p.where && p.where !== '—' ? `<div class="card-where">${p.where}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function filterBy(areaId, btn) {
  currentFilter = areaId;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function openDetail(idx) {
  const p = projects[idx];
  if (!p) return;
  document.getElementById('d-area').textContent = p.area_label;
  document.getElementById('d-title').textContent = p.title;
  document.getElementById('d-next').textContent = p.next;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-meta').textContent = [STATUS_LABELS[p.status], p.where].filter(x => x && x !== '—').join(' · ');
  document.getElementById('overlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

load();
</script>
</body>
</html>
